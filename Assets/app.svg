<?xml version="1.0" encoding="UTF-8"?>
<!--
  BreezeFlow app icon (256x256). Canonical source for the design.
  Render to multi-size .ico via Assets/build-icon.ps1.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F57C00"/>
      <stop offset="1" stop-color="#D32F2F"/>
    </linearGradient>
    <!-- shared cylinder shape: 52w x 64h -->
    <g id="cyl">
      <!-- back-of-top (slightly darker disc) -->
      <ellipse cx="26" cy="10" rx="26" ry="10" fill="#FFFFFF"/>
      <!-- body silhouette -->
      <rect x="0" y="10" width="52" height="44" fill="#FFFFFF"/>
      <!-- bottom curve -->
      <ellipse cx="26" cy="54" rx="26" ry="10" fill="#FFFFFF"/>
      <!-- top rim accent (open top look) -->
      <ellipse cx="26" cy="10" rx="26" ry="10"
               fill="none" stroke="#7C1C0E" stroke-width="3"/>
      <!-- mid platter line (db cue) -->
      <path d="M 0,30 A 26,8 0 0 0 52,30" fill="none"
            stroke="#7C1C0E" stroke-width="3" stroke-linecap="round"/>
    </g>
  </defs>

  <!-- background rounded square -->
  <rect x="8" y="8" width="240" height="240" rx="40" ry="40" fill="url(#bg)"/>

  <!-- "ELT" letters, bold white -->
  <text x="128" y="120"
        font-family="Segoe UI, Arial, sans-serif"
        font-weight="900" font-size="96"
        fill="#FFFFFF"
        text-anchor="middle"
        letter-spacing="2">ELT</text>

  <!-- left DB cylinder -->
  <use href="#cyl" x="20"  y="156"/>
  <!-- right DB cylinder -->
  <use href="#cyl" x="184" y="156"/>

  <!-- flow arrow connecting the cylinders (shortened so it does not touch them) -->
  <g stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <line x1="100" y1="188" x2="148" y2="188"/>
    <polyline points="140,178 160,188 140,198"/>
  </g>
</svg>
