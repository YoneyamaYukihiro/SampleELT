name: CI

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: |
          dotnet restore SampleELT.csproj
          dotnet restore SampleELT.Tests/SampleELT.Tests.csproj

      - name: Build (main project)
        run: dotnet build SampleELT.csproj --no-restore -c Release

      - name: Test
        run: >
          dotnet test SampleELT.Tests/SampleELT.Tests.csproj
          --no-restore
          -c Release
          --verbosity normal
          --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/*.trx"
